name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lab
          POSTGRES_PASSWORD: lab
          POSTGRES_DB: lab
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U lab"
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --quiet \
            pyyaml "psycopg[binary]" httpx mplfinance pandas numpy scipy matplotlib \
            pytest ruff

      - name: Lint
        run: |
          ruff check lab tests exporters bin
          ruff format --check lab tests exporters

      # SELF-ADVANCING acceptance: the procedure runner must never grow a shell.
      # A scraped page can carry prompt injection; executing a model-authored
      # string is remote code execution. Data only, forever.
      - name: No shell in procedures runner
        run: |
          ! grep -nE "subprocess|os\.system|os\.popen|eval\(|exec\(" lab/procedures.py

      - name: Unit tests
        run: python -m pytest -q -m "not live"
        env:
          LAB_TEST_DSN: postgresql://lab:lab@localhost:55432/lab
