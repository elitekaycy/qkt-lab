# qkt-lab — the one file you edit.
#
# Everything the lab does is reachable from here. If a behaviour is not
# expressible in this file, that is a bug in the design, not a reason to
# hardcode it.
#
# Secrets are NEVER written here. Use ${VAR} and put the value in .env.

lab:
  mode: demo                  # demo | live. `live` refuses to start until the
                              # phase-6 A/B has run and passed. See docs/specs/phase-6.
  timezone: UTC               # everything internal is UTC. Display only.
  state_dir: ./state          # charts, run logs, artifacts
  kill_switch: ./KILL         # if this file exists, no order is ever placed.
                              # `touch KILL` is the emergency stop.

# ---------------------------------------------------------------------------
# Execution surface — how we reach the venue.
# ---------------------------------------------------------------------------
qkt:
  bin: qkt                            # the qkt CLI on PATH
  config: ./qkt.config.yaml           # qkt's own config (brokers, gateway urls)
  broker: EXNESS                      # the broker prefix used in BROKER:SYMBOL
  timeout_s: 30
  retries: 2                          # qkt's bot verbs use retryAttempts=0, so
                                      # the lab owns transient-failure retry.

# ---------------------------------------------------------------------------
# What we trade.
# ---------------------------------------------------------------------------
instruments:
  - symbol: EXNESS:XAUUSD
    contract_value: 100               # 1 lot = 100 oz. Used for position sizing.
    playbook: playbooks/xauusd.md
    schedule: "0 * * * *"             # hourly, on the 1h bar close
    timeframes: [1h, 15m]             # charts + bars handed to the model
    bars: 200                         # per timeframe
    max_lots: 0.30                    # hard per-instrument cap. MUST sit ABOVE the size
                                      # the risk model normally produces, or it binds on
                                      # every trade and silently becomes the only sizing
                                      # rule — the risk model goes inert and you don't
                                      # notice. At 0.5% risk on a ~$4 gold stop with the
                                      # $1k demo account, typical size is ~0.01 lots.
                                      # This cap is for outliers, not normal days.

# ---------------------------------------------------------------------------
# The agent. Three separate sessions, three separate prompts, three separate
# sets of write permissions. None of them marks its own homework.
# ---------------------------------------------------------------------------
agent:
  provider: codex                    # codex | claude
  bin: codex                         # headless: `codex exec`
  model: gpt-5.6-sol
  as_prefix: lab                      # --as lab-xau. MUST keep the resulting
                                      # `bot-<as>-<epochms>` order comment under
                                      # 31 chars or MT5 rejects the order outright.

  trader:
    prompt: prompts/trader.md
    context_budget_tokens: 8000       # the packet. Bigger is not better.
    # The trader gets READ-ONLY qkt verbs. It cannot place an order and it does
    # not choose position size. It emits a proposal; code gates and executes.

  distiller:
    prompt: prompts/distiller.md
    schedule: "0 22 * * *"            # nightly, after the session
    # Proposes belief edits. Cannot set a belief's status, n, or ticket lists.

  researcher:
    prompt: prompts/researcher.md
    schedule: "0 6 * * *"             # daily
    budget_tokens: 200000             # per run. Research is open-ended, not unbounded.
    web_search: true
    anomaly_triggers:
      price_move_atr: 3.0             # moved >3 ATR with nothing in context explaining it
      loss_with_intact_thesis: true   # lost badly, rationale still looks right
      strong_driver_failed: true      # a map node marked `strong` didn't fire
      surprise_vs_consensus: true     # a release printed far off forecast

# ---------------------------------------------------------------------------
# Risk and sizing. See docs/SIZING.md.
#
# The model DOES determine size — that is the job of a portfolio manager. What it
# does not do is pick a number freely. It states a conviction; code composes that
# with a risk budget, volatility, and the correlation of the existing book.
#
# A fund gives its PM a risk budget, measures whether their conviction was any
# good, and adjusts the budget accordingly. Small book, prove yourself, book grows.
# ---------------------------------------------------------------------------
risk:
  risk_per_trade_pct: 0.5             # of equity, per trade, at conviction-neutral
  portfolio_heat_pct: 2.0             # total open risk across the whole book
  correlation_threshold: 0.6          # above this, two positions SHARE a risk budget
                                      # rather than each getting their own. Long gold
                                      # + short DXY + long silver is one trade wearing
                                      # three hats.

sizing:
  # lots = (equity × risk_pct / (stop_distance × contract_value))   <- vol-targeted:
  #        × f(conviction)                                             ATR-derived stops
  #        × correlation_haircut(open book)                            keep risk constant
  #        capped by max_lots and portfolio_heat_pct                   in R across regimes
  stage: flat                         # flat | fitted
                                      #
                                      # flat   — conviction is RECORDED on every decision
                                      #          but multiplier is 1.0. Where we start.
                                      # fitted — conviction drives real size, via a curve
                                      #          FITTED to realized outcomes.
                                      #
                                      # `fitted` is not a config edit made on a hunch. It
                                      # requires a calibration report showing that high-
                                      # conviction trades actually outperform (monotone
                                      # mean-R across buckets, confidence intervals that
                                      # separate). The code refuses otherwise.
                                      #
                                      # If conviction turns out uncorrelated with outcome,
                                      # this stays `flat` forever — and we have learned
                                      # that the model thinks it knows when it is right
                                      # and doesn't. That is the project working.

  conviction_max_mult: 2.0            # hard ceiling on f(), whatever the fit says
  kelly_fraction: 0.5                 # fractional Kelly. NEVER 1.0 — full Kelly is
                                      # growth-optimal only if the edge estimate is
                                      # exactly right, and catastrophically over-levered
                                      # when it isn't. With n=19 in the top bucket, it
                                      # won't be.
  fit: null                           # written by the calibration report. Not by hand.

# The risk officer is not the PM. These are evaluated in code AFTER the proposal
# exists. The model never sees them and cannot argue with them.
gates:                                # ALL must pass. Any rejection = no order.
  require_sl: true                    # no stop, no trade. Never disable.
  min_rr: 1.5                         # recomputed from real prices; the model's
                                      # own expected_rr is never trusted.
  max_open_positions: 3               # counted over LAB-OWNED tickets from our own
  max_exposure_lots: 0.5              # DB — never from `qkt bot positions`, which
                                      # has no magic filter and sees other strategies.
  max_daily_loss_pct: 2.0             # realized-today + floating, vs equity. Breach
                                      # halts new orders for the rest of the day.
  news_blackout_minutes: 30           # +/- around a high-impact release for this symbol

# ---------------------------------------------------------------------------
# Memory. Four kinds, three validation regimes. See docs/MEMORY.md.
# ---------------------------------------------------------------------------
memory:
  root: memory/

  # Freely accumulated. Validated by "did it work".
  procedures: memory/procedures/
  # Freely accumulated, with a decaying usefulness score.
  sources: memory/sources/
  # The causal map. Validated against MARKET DATA, not against our trades —
  # which is why it can be rich and confident immediately.
  map: memory/map/

  # Tactical beliefs. The ONLY memory that claims a tradeable edge, and the only
  # one with a hard statistical gate.
  beliefs:
    path: memory/beliefs/
    activate_min_trades: 30           # a floor for sanity, not a blessing. A true
                                      # per-trade Sharpe of 0.2 needs ~96 trades to
                                      # reject zero edge.
    multiple_testing: benjamini-hochberg   # applied family-wide across ALL candidates
    alpha: 0.05                       # each distill cycle. One lesson out of forty
                                      # clearing p<0.05 is a max-of-N statistic.
    score_on: realized_net_pnl        # never on the model's self-assessment.
    withhold_candidates: true         # CANDIDATE beliefs are NOT shown to the trader.
                                      # If it could see them it would act on them and
                                      # they would confirm themselves.

# ---------------------------------------------------------------------------
# The decision log — the machine's source of truth. Typed, structured, queryable.
# Belief predicates are evaluated as SQL against this.
# ---------------------------------------------------------------------------
store:
  dsn: ${LAB_DATABASE_URL}            # postgres://lab:***@localhost:5432/lab
  join_interval: "*/15 * * * *"       # outcome joiner
  unjoined_alarm_days: 3              # a ticket open this long with no OUT deal
                                      # is a bug, not a trade. Alarm, don't ignore.

# ---------------------------------------------------------------------------
# The journal UI — what YOU open, read, search, and browse.
# Deltalytix (self-hosted). Not on the loop's critical path: if it is down,
# trades still execute and beliefs still score.
# ---------------------------------------------------------------------------
journal:
  deltalytix:
    enabled: false                    # opt in only after building the image and
                                      # starting `--profile journal`; the base
                                      # deployment must not log export errors.
    dsn: ${DELTALYTIX_DATABASE_URL}
    user_id: local-dashboard-user
    user_email: local-dashboard@deltalytix.local
    account_number: LAB-XAU
    starting_balance: 1000            # required for the equity curve to render
    charts_base_url: http://localhost:${LAB_CHARTS_PORT:-8080}/charts
                                      # images[] must be URLs, not paths
    export_no_trades: false           # NO_TRADE/GATED rows cannot exist in its schema.
                                      # They stay in the lab store where the machine
                                      # learns from them.

# ---------------------------------------------------------------------------
# Data sources.
#
# THIS IS NOT A WHITELIST. These are SEEDS — starting points. The agent discovers
# its own sources, records what each was good for and whether its information was
# borne out, and writes down the recipe that reached it so it never re-derives it.
#
#   memory/sources/     — the living registry, WRITTEN BY RESEARCH
#   memory/procedures/  — the working recipe for each (the curl that returns valid
#                         JSON, the scrape that survives, the release-time gotcha)
#
# Harvest reads the REGISTRY, not this list. Reach compounds — that is the point.
# A missing source is recorded as MISSING, never as a neutral reading, or every
# belief conditioned on it is quietly poisoned.
# ---------------------------------------------------------------------------
# No data or model API keys. The default local runtime uses the host's
# ChatGPT-managed Codex login plus the MT5 broker login. These seeds are all
# keyless public endpoints, verified working.
source_seeds:
  - id: fred-macro                    # keyless: the graph CSV endpoint needs no key
    url: https://fred.stlouisfed.org/graph/fredgraph.csv
    series: [DFII10, DTWEXBGS, T10Y2Y]   # 10y real yield, broad dollar, curve

  - id: yahoo-cross-asset             # keyless: any ticker. AAPL, ^VIX, DX-Y.NYB.
    url: https://query1.finance.yahoo.com/v8/finance/chart/{ticker}
    # This is what the causal graph's episode studies run on — cross-asset OHLC
    # going back years, which is how an edge earns its evidence WITHOUT trades.

# Everything past these seeds, the agent discovers itself. See docs/SELF-ADVANCING.md.
#   memory/procedures/  — declarative fetch specs. NEVER shell: a scraped page can
#                         carry prompt injection, and executing a model-authored
#                         string is remote code execution. Data, run by an HTTP
#                         client, with a mandatory validator.
#   memory/sources/     — the living registry, with a decaying usefulness score.
# Harvest reads the REGISTRY, not this list.

research:
  # Open-ended, not unbounded. It may go anywhere; it must come back with durable
  # artifacts (a graph node, an edge, a source card, a procedure) — never prose that
  # gets read once and lost. An unbounded web-search agent with no output contract
  # produces beautiful narratives and no knowledge, and recency-biased narratives are
  # exactly how LLMs get confidently wrong about markets.
  web_search: true                    # Codex live web search. No data API key.
  respect_robots_txt: true            # non-negotiable
  rate_limit_rps: 1
  max_new_sources_per_run: 10         # the registry grows deliberately, not in a burst
  new_domain_policy: review_queue     # a new domain is not auto-trusted. If this queue
                                      # is never read, the security boundary in
                                      # SELF-ADVANCING.md §1 is decorative — say so.

# ---------------------------------------------------------------------------
# The calendar. The ONLY source that gates, which makes it the only one where
# being wrong is a money problem rather than a data problem.
#
# The gate NEVER calls an LLM. RESEARCH populates a cache file with provenance;
# the gate reads the file and does arithmetic on it. See docs/RUNTIME.md §4.
#
# The model may POPULATE a gate. It may never BE one.
# ---------------------------------------------------------------------------
calendar:
  cache: memory/calendar/upcoming.yaml
  refresh: "0 6 * * *"                # RESEARCH refreshes it daily
  max_age_hours: 30                   # older than this = STALE = REFUSE TO TRADE
  min_sources: 2                      # one source agreeing with itself is not
                                      # corroboration. Two independent, or the event
                                      # is not `confirmed`.
  fail_closed: true                   # stale, missing, or uncertain => NO TRADE.
                                      #
                                      # The asymmetry is the entire point: a false
                                      # positive costs us one missed trade. A false
                                      # negative means being long gold into a CPI
                                      # print we didn't know about. Those are not
                                      # comparable, so the gate is deliberately
                                      # trigger-happy. Never set this to false.

# ---------------------------------------------------------------------------
# Phase 6. The experiment that could tell us the memory is worthless.
# ---------------------------------------------------------------------------
experiment:
  ab_enabled: true
  arms: [beliefs, control]            # identical gates and sizing; control gets
                                      # the playbook but no beliefs.
  assignment: hash                    # deterministic on (ts, symbol)
  min_trades_per_arm: 100             # pre-register BEFORE seeing data.
