# qkt-lab — the whole loop from one command.
#
#   docker compose up -d                     # loop + first-party journal
#   touch KILL                               # emergency stop (bind-mounted; gate stats it)
#
# Bind-mount rule: anything a human reads or writes (memory/, KILL, lab.yaml,
# prompts/, state/charts) is a bind mount; anything only a machine touches
# (postgres data) is a named volume. memory/ MUST be a bind mount — it is
# git-tracked, and the agent's commits must land in the host working tree.

services:
  mt5-gateway:
    image: elitekaycy/mt5-gateway-api:0.3.4
    container_name: lab-mt5-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - gateway-config:/config
    # Headless broker login: the gateway logs in on boot from these, idempotent
    # across restarts. Values live in .env, never in this file.
    environment:
      MT5_LOGIN: ${MT5_LOGIN}
      MT5_PASSWORD: ${MT5_PASSWORD}
      MT5_SERVER: ${MT5_SERVER}
      MT5_ENABLE_ALGO_TRADING: "1"
      API_KEY: ${MT5_API_KEY}

  postgres:
    image: postgres:16-alpine
    container_name: lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: ${LAB_DB_PASSWORD:-lab}
      POSTGRES_DB: lab
    volumes:
      - lab-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab"]
      interval: 5s
      retries: 10

  migrate:
    build: .
    image: qkt-lab:local
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/lab:ro
    environment: &lab-env
      LAB_DATABASE_URL: postgresql://lab:${LAB_DB_PASSWORD:-lab}@postgres:5432/lab
      LAB_CHARTS_PORT: ${LAB_CHARTS_PORT:-8080}
      # Codex's nested bubblewrap cannot create user namespaces in a default
      # Docker container. Docker is the outer sandbox; see scheduler mounts.
      CODEX_EXTERNAL_SANDBOX: "1"
      QKT_BROKER_EXNESS_API_KEY: ${MT5_API_KEY}
      QKT_BROKER_EXNESS_EXPECTED_ACCOUNT_LOGIN: ${MT5_LOGIN}
      QKT_BROKER_EXNESS_EXPECTED_ACCOUNT_SERVER: ${MT5_SERVER}
    command: >
      python3 -c "from lab.store import Store; from pathlib import Path;
      Store('postgresql://lab:${LAB_DB_PASSWORD:-lab}@postgres:5432/lab').migrate(Path('db/schema.sql'));
      print('schema applied')"
    restart: "no"

  scheduler:
    image: qkt-lab:local
    container_name: lab-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      # The outer sandbox for Codex research. Source/config are immutable; only
      # durable memory, generated state, and the research commit are writable.
      - ./:/lab:ro
      - ./memory:/lab/memory
      - ./state:/lab/state
      - ./.git:/lab/.git
      # Codex headless auth: reuse the host's ChatGPT login. Mount only the auth
      # file, not all of ~/.codex (which may contain unrelated MCP credentials).
      - ~/.codex/auth.json:/root/.codex/auth.json
    environment: *lab-env
    # The crontab is GENERATED from lab.yaml so there is one source of truth
    # for when things run. supercronic logs to stdout: `docker compose logs scheduler`.
    # supercronic must be an ABSOLUTE path: as pid 1 it re-execs argv[0], and a
    # bare name found via PATH fails that re-exec with "no such file or directory".
    command: >
      bash -c "python3 bin/gen-crontab > /tmp/crontab
      && exec /usr/local/bin/supercronic /tmp/crontab"

  charts:
    image: caddy:2-alpine
    container_name: lab-charts
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LAB_CHARTS_PORT:-8080}:8080"
    volumes:
      - ./state/charts:/srv/charts:ro
    command: caddy file-server --browse --root /srv --listen :8080

  journal-ui:
    image: qkt-lab:local
    container_name: lab-journal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      charts:
        condition: service_started
    ports:
      - "127.0.0.1:${LAB_JOURNAL_PORT:-8421}:8421"
    volumes:
      - ./:/lab:ro
    environment:
      <<: *lab-env
      LAB_JOURNAL_INTERNAL_PORT: "8421"
      LAB_CHARTS_PUBLIC_URL: http://localhost:${LAB_CHARTS_PORT:-8080}/charts
      MT5_GATEWAY_URL: http://mt5-gateway:5001
    command: python3 -m lab.dashboard

volumes:
  lab-pg:
  gateway-config:
